<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* ── Palette: đen / trắng / be ── */
  --green:#1a1a1a;--green-hover:#000;--green-tint:#f0ece4;
  --red:#b04a2a;--red-tint:#f7ede8;--amber:#8a6a3a;
  --bg:#fff;--bg2:#f7f4ef;--bg3:#ede9e1;--bg4:#e2ddd4;
  --text:#1a1a1a;--text2:#5a5650;--text3:#9a9590;--text4:#c8c4bc;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--border3:rgba(0,0,0,0.28);
  --sh:0 1px 3px rgba(0,0,0,0.07);
  --font:'Be Vietnam Pro',system-ui,sans-serif;
  --r8:8px;--r12:12px;--r16:16px;
  --ease:cubic-bezier(0.16,1,0.3,1);
  --bottom-nav:60px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-theme=dark]{
  --bg:#141210;--bg2:#1e1b18;--bg3:#272420;--bg4:#302d28;
  --text:#f0ece4;--text2:#a8a39b;--text3:#68635c;--text4:#3d3a35;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--border3:rgba(255,255,255,0.22);
  --green:#e8e0d0;--green-hover:#fff;--green-tint:#2a2720;
  --red:#d4694a;--red-tint:#2a1e18;--amber:#c8a060;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;transition:background .2s,color .2s}

/* ── TOPBAR (desktop) ── */
.topbar{height:52px;background:var(--bg);border-bottom:.5px solid var(--border2);display:flex;align-items:center;padding:0 20px;gap:10px;position:sticky;top:0;z-index:20}
.brand{display:flex;align-items:center;gap:0;flex:1;min-width:0}
.brand svg{flex-shrink:0}
.brand small{color:var(--text3);font-weight:400;font-size:11px;margin-left:6px}
.topbar-actions{display:flex;align-items:center;gap:8px}

/* ── BOTTOM NAV (mobile only) ── */
.bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--bottom-nav) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:var(--bg);border-top:.5px solid var(--border2);
  z-index:30;
  display:none;
  align-items:stretch;
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:none;cursor:pointer;
  color:var(--text3);font-family:var(--font);font-size:10px;font-weight:500;
  padding:8px 4px;transition:color 120ms;
}
.bnav-item.active{color:var(--text);font-weight:600}
.bnav-item.add-btn{
  color:#fff;background:var(--green);border-radius:var(--r12);
  margin:8px 6px;flex:1.2;font-size:11px;font-weight:600;
}
.bnav-icon{font-size:20px;line-height:1}

/* FAB — mobile add button (shown separately) */
.fab{
  display:none;
  position:fixed;bottom:calc(var(--bottom-nav) + var(--safe-bottom) + 12px);right:16px;
  width:52px;height:52px;border-radius:50%;
  background:var(--text);color:var(--bg);border:none;
  font-size:26px;cursor:pointer;z-index:25;
  box-shadow:0 4px 16px rgba(0,0,0,0.25);
  align-items:center;justify-content:center;
  transition:transform 120ms,background 120ms;
}
.fab:active{transform:scale(.93);background:#333}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r8);border:.5px solid var(--border2);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all 120ms;background:var(--bg);color:var(--text2);white-space:nowrap}
.btn:hover{background:var(--bg3)}
.btn-primary{background:var(--green);color:#fff;border-color:transparent}
.btn-primary:hover{background:var(--green-hover)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-danger{background:var(--red-tint);color:var(--red);border-color:transparent}
.theme-btn{background:none;border:.5px solid var(--border2);border-radius:var(--r8);padding:5px 8px;cursor:pointer;font-size:14px;transition:background 120ms}
.theme-btn:hover{background:var(--bg3)}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r8);padding:3px}
.tab{padding:5px 11px;border-radius:6px;border:none;background:none;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all 120ms}
.tab.active{background:var(--bg);color:var(--green);box-shadow:var(--sh)}

/* ── SEARCH ── */
.search{position:relative}
.search input{padding:6px 10px 6px 28px;width:180px;border:.5px solid var(--border2);border-radius:var(--r8);font-family:var(--font);font-size:12px;background:var(--bg);color:var(--text);outline:none;transition:border-color 120ms,width 200ms}
.search input:focus{border-color:var(--green);width:220px}
.search-ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}

/* ── CONTENT ── */
.content{padding:16px 20px;max-width:1280px;margin:0 auto}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--bg2);border-radius:var(--r12);padding:12px 14px;border:.5px solid var(--border)}
.stat-label{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:600;letter-spacing:-.01em}
.stat-sub{font-size:11px;color:var(--text2);margin-top:3px}
.prog{height:3px;background:var(--bg4);border-radius:99px;overflow:hidden;margin-top:5px}
.prog-fill{height:100%;background:var(--green);border-radius:99px;transition:width .6s var(--ease)}

/* ── SYNC BAR ── */
.sync-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--bg2);border-radius:var(--r8);border:.5px solid var(--border);margin-bottom:14px;font-size:12px;color:var(--text2)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;transition:background .3s}
.dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.sync-time{margin-left:auto;font-size:11px;color:var(--text3)}

/* ── FILTERS ── */
.filters{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.flabel{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.chip{padding:5px 11px;border-radius:99px;border:.5px solid var(--border2);font-size:11px;font-weight:500;cursor:pointer;background:var(--bg);color:var(--text2);transition:all 120ms;font-family:var(--font)}
.chip.on{background:var(--green-tint);color:var(--green);border-color:var(--border3)}
.chip.san.on{background:var(--bg3);color:var(--text);border-color:var(--border3)}
.chip.ss.on{background:var(--bg3);color:var(--text);border-color:var(--border3)}
[data-theme=dark] .chip.san.on{background:var(--bg3);color:var(--text)}

/* ── KANBAN ── */
.kanban{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col{background:var(--bg2);border-radius:var(--r12);padding:12px;min-height:200px;border:.5px solid var(--border)}
.col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.col-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3)}
.col-n{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;background:var(--bg3);color:var(--text3)}
.col-n.d{background:var(--green-tint);color:var(--green)}
.col-n.c{background:var(--red-tint);color:var(--red)}

/* ── CARD ── */
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r8);padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:border-color 120ms,transform 120ms,box-shadow 120ms;animation:fadeUp 220ms var(--ease) both}
.card:active{transform:scale(.98)}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card-ch{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;margin-bottom:7px;text-transform:uppercase;letter-spacing:.03em}
.ch-san{background:#ede9e1;color:#5a5650}
.ch-ss{background:#f0ece4;color:#1a1a1a;border:.5px solid var(--border2)}
[data-theme=dark] .ch-san{background:var(--bg3);color:var(--text2)}
.card-body{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:8px}
.card-foot{display:flex;align-items:center;gap:8px}
.card-name{font-size:11px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-ts{font-size:10px;color:var(--text4);white-space:nowrap}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;white-space:nowrap}
.bd{background:var(--green-tint);color:var(--green)}
.bc{background:var(--red-tint);color:var(--red)}

/* ── LIST ── */
.list-wrap{overflow-x:auto;border-radius:var(--r12);border:.5px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--bg)}
thead th{text-align:left;font-weight:500;font-size:10px;color:var(--text3);padding:9px 13px;border-bottom:.5px solid var(--border2);text-transform:uppercase;letter-spacing:.06em;background:var(--bg2);white-space:nowrap}
tbody td{padding:10px 13px;border-bottom:.5px solid var(--border);color:var(--text);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg2)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end;justify-content:center;z-index:100;opacity:0;transition:opacity .18s}
.overlay.open{display:flex}
.overlay.show{opacity:1}
.modal{
  background:var(--bg);width:100%;max-width:500px;
  border-radius:var(--r16) var(--r16) 0 0;
  padding:20px 20px calc(20px + var(--safe-bottom));
  box-shadow:0 -4px 32px rgba(0,0,0,.14);
  border:.5px solid var(--border2);
  transform:translateY(100%);
  transition:transform .3s var(--ease);
  max-height:90vh;overflow-y:auto;
}
.overlay.show .modal{transform:translateY(0)}
/* drag handle */
.modal-handle{width:36px;height:4px;background:var(--bg3);border-radius:99px;margin:0 auto 16px}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:15px;font-weight:600}
.modal-x{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:2px 6px;border-radius:6px}
.fg{margin-bottom:13px}
.img-upload{width:100%;border:.5px dashed var(--border3);border-radius:var(--r8);padding:14px;text-align:center;cursor:pointer;transition:background 120ms;font-size:12px;color:var(--text3);background:var(--bg2)}
.img-upload:hover{background:var(--bg3)}
.img-upload input{display:none}
.thumb-preview{width:100%;height:120px;object-fit:cover;border-radius:var(--r8);border:.5px solid var(--border);display:block;margin-top:8px}
.card-thumb{width:100%;height:110px;object-fit:cover;border-radius:6px 6px 0 0;display:block;margin:-11px -13px 10px;width:calc(100% + 26px)}
.has-thumb{padding-top:0;overflow:hidden}
.thumb-del{font-size:10px;color:var(--red);cursor:pointer;margin-top:4px;display:inline-block}
.flbl{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
.fi,.fs,.fta{width:100%;padding:10px 12px;border:.5px solid var(--border2);border-radius:var(--r8);font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color 120ms}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--green)}
.fta{resize:vertical;min-height:80px;line-height:1.5}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-foot{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:.5px solid var(--border)}
.btn-save-full{width:100%;padding:13px;font-size:14px;border-radius:var(--r12);justify-content:center}

/* ── EMPTY ── */
.empty{text-align:center;padding:36px 16px;color:var(--text4);font-size:12px}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--bottom-nav) + var(--safe-bottom) + 12px);left:50%;transform:translateX(-50%) translateY(8px);background:#1C2B12;color:#EBF3E4;padding:9px 18px;border-radius:99px;font-size:12px;font-weight:500;z-index:200;opacity:0;pointer-events:none;transition:all .22s var(--ease);white-space:nowrap}
[data-theme=dark] .toast{background:#EBF3E4;color:#1C2B12}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SKELETON ── */
.skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;border-radius:var(--r8);animation:shimmer 1.4s linear infinite}
@keyframes shimmer{to{background-position:-200% 0}}

/* ── DESKTOP ── */
@media(min-width:641px){
  .bottom-nav{display:none !important}
  .fab{display:none !important}
  .modal{border-radius:var(--r16);max-width:460px;padding:24px;margin:auto;transform:translateY(12px) scale(.98)}
  .overlay{align-items:center}
  .overlay.show .modal{transform:translateY(0) scale(1)}
  .modal-handle{display:none}
  .toast{bottom:20px}
}

/* ── MOBILE ── */
@media(max-width:640px){
  /* hide desktop controls */
  .topbar .tabs{display:none}
  .topbar .search{display:none}
  .topbar-actions{display:none}

  /* topbar slim */
  .topbar{height:48px;padding:0 16px}
  .brand svg{width:120px;height:30px}

  /* show bottom nav + fab */
  .bottom-nav{display:flex !important}
  .fab{display:flex !important}

  /* content padding bottom for nav */
  .content{
    padding:12px 14px;
    padding-bottom:calc(var(--bottom-nav) + var(--safe-bottom) + 70px);
  }

  /* stats 2 col */
  .stats{grid-template-columns:1fr 1fr;gap:8px}
  .stat{padding:10px 12px}
  .stat-val{font-size:20px}

  /* kanban single col */
  .kanban{grid-template-columns:1fr}

  /* sync bar compact */
  .sync-bar{padding:7px 12px;font-size:11px}

  /* filters scroll horizontal */
  .filters{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;gap:6px}
  .filters::-webkit-scrollbar{display:none}
  .flabel{flex-shrink:0}
  .chip{flex-shrink:0}
  .filters > div{flex-shrink:0;display:flex;gap:6px}

  /* modal full bottom sheet */
  .modal-handle{display:block}
}
</style>
</head>

    <div class="stat"><div class="skel" style="height:11px;width:55%;margin-bottom:8px"></div><div class="skel" style="height:24px;width:38%"></div></div>

<div class="toast" id="toast"></div>
<iframe name="_pifr" style="display:none"></iframe>

<script>
const API = 'https://script.google.com/macros/s/AKfycby-W32vZQ5zLYSMdCJ4V4b3yrp7GMjVEZ2382fGGgZPWMBwdAl9R6I2wdqB62mq0e_7jQ/exec';
const CACHE_KEY = 'cc_cache_v1';
const THEME_KEY = 'cc_theme';

let data=[], editId=null, activeCh='all', activeSt=new Set(), q='', view='kanban', saving=false, mobileSearchOpen=false, currentImage='';

const isMobile = () => window.innerWidth <= 640;

window.onload = function() {
  try { applyTheme(localStorage.getItem(THEME_KEY)||'light'); } catch(e){}
  setupMobileUI();
  renderAll([]);
  setSyncStatus('syncing','Đang kết nối...');
  try {
    const c = localStorage.getItem(CACHE_KEY);
    if(c){ const p=JSON.parse(c); if(p&&p.rows){data=p.rows;renderAll(data);setSyncStatus('ok','Cache · sync đang tải...');}}
  } catch(e){}
  syncData();
  document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
  window.addEventListener('resize', setupMobileUI);
};

function setupMobileUI(){
  const mob = isMobile();
  // show/hide mobile-only elements
  document.getElementById('themeBtnMob').style.display = mob ? 'block' : 'none';
  document.getElementById('mobileSearchWrap').style.display = (mob && mobileSearchOpen) ? 'flex' : 'none';
}

// ── THEME ──
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  const icon = t==='dark'?'☀️':'🌙';
  document.getElementById('themeBtn').textContent = icon;
  document.getElementById('themeBtnMob').textContent = icon;
  document.getElementById('themeIconNav').textContent = icon;
  try{localStorage.setItem(THEME_KEY,t);}catch(e){}
}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}

// ── MOBILE NAV ──
function mobileTab(v){
  view=v;
  document.getElementById('bn-kanban').classList.toggle('active',v==='kanban');
  document.getElementById('bn-list').classList.toggle('active',v==='list');
  document.getElementById('kanban').style.display = v==='kanban'?'grid':'none';
  document.getElementById('listV').style.display  = v==='list'?'block':'none';
  renderAll(data);
}
function mobileToggleSearch(){
  mobileSearchOpen = !mobileSearchOpen;
  document.getElementById('bn-search').classList.toggle('active', mobileSearchOpen);
  const wrap = document.getElementById('mobileSearchWrap');
  wrap.style.display = mobileSearchOpen ? 'flex' : 'none';
  if(mobileSearchOpen) document.getElementById('searchMob').focus();
  else { document.getElementById('searchMob').value=''; onSearch(''); }
}

// ── JSONP ──
function jsonpGet(params){
  return new Promise((resolve,reject)=>{
    const cb='jcb_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    let done=false;
    const timer=setTimeout(()=>{if(done)return;done=true;cleanup();reject(new Error('Timeout 15s'));},15000);
    window[cb]=function(d){if(done)return;done=true;clearTimeout(timer);cleanup();resolve(d);};
    function cleanup(){delete window[cb];const s=document.getElementById(cb);if(s)s.remove();}
    const qs=Object.entries({...params,callback:cb,_:Date.now()}).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    const s=document.createElement('script');
    s.id=cb;s.src=API+'?'+qs;
    s.onerror=()=>{if(done)return;done=true;clearTimeout(timer);cleanup();reject(new Error('Không load được script'));};
    document.head.appendChild(s);
  });
}
function jsonpWrite(payload){
  // Nếu có ảnh (base64 dài) → POST form, rồi sync lại để confirm
  // Nếu không có ảnh → GET JSONP như cũ
  const hasImage = payload.image && payload.image.length > 100;
  if (hasImage) {
    return formPost(payload);
  }
  const params={};
  for(const[k,v]of Object.entries(payload)){if(v!==undefined&&v!==null)params[k]=String(v);}
  return jsonpGet(params);
}

function formPost(payload) {
  return new Promise(resolve => {
    const f = document.createElement('form');
    f.method = 'POST'; f.action = API; f.target = '_pifr'; f.style.display = 'none';
    const inp = document.createElement('input');
    inp.type = 'hidden'; inp.name = 'payload'; inp.value = JSON.stringify(payload);
    f.appendChild(inp); document.body.appendChild(f); f.submit();
    setTimeout(() => { f.remove(); resolve({ ok: true }); }, 2000);
  });
}

// ── IMAGE ──
function handleImage(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 1.5 * 1024 * 1024) { toast('⚠️ Ảnh quá lớn — chọn ảnh dưới 1.5MB'); input.value=''; return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      // Compress to max 400x300
      const canvas = document.createElement('canvas');
      const maxW = 600, maxH = 400;
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      currentImage = canvas.toDataURL('image/jpeg', 0.72);
      document.getElementById('imgPreview').src = currentImage;
      document.getElementById('imgPreview').style.display = 'block';
      document.getElementById('imgDel').style.display = 'inline-block';
      document.getElementById('imgLabel').textContent = '✅ Đã chọn ảnh';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function clearImage() {
  currentImage = '';
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('imgDel').style.display = 'none';
  document.getElementById('imgLabel').textContent = '📷 Chọn ảnh (tối đa 800KB)';
  document.getElementById('imgInput').value = '';
}
function resetImageUI(existingImage) {
  currentImage = existingImage || '';
  if (currentImage) {
    document.getElementById('imgPreview').src = currentImage;
    document.getElementById('imgPreview').style.display = 'block';
    document.getElementById('imgDel').style.display = 'inline-block';
    document.getElementById('imgLabel').textContent = '✅ Có ảnh — click để thay';
  } else {
    clearImage();
  }
}

// ── SYNC ──
async function syncData(){
  ['syncBtn','syncBtnMob'].forEach(id=>{const b=document.getElementById(id);if(b){b.disabled=true;}});
  document.getElementById('syncBtnMob').querySelector('.bnav-icon').textContent='⏳';
  setSyncStatus('syncing','Đang kết nối...');
  try{
    const res=await jsonpGet({action:'getData'});
    if(res.error)throw new Error(res.error);
    data=res.rows||[];
    try{localStorage.setItem(CACHE_KEY,JSON.stringify({rows:data}));}catch(e){}
    renderAll(data);
    setSyncStatus('ok','Đã sync · '+data.length+' video');
    toast('✅ Đã tải '+data.length+' video');
  }catch(err){
    setSyncStatus('err','Lỗi: '+err.message);
    toast('❌ '+err.message);
  }finally{
    ['syncBtn','syncBtnMob'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=false;});
    document.getElementById('syncBtnMob').querySelector('.bnav-icon').textContent='↻';
  }
}

// ── SAVE ──
async function saveItem(){
  if(saving)return;
  const content=document.getElementById('fContent').value.trim();
  if(!content){toast('⚠️ Vui lòng nhập nội dung video');return;}
  saving=true;
  const sb=document.getElementById('saveBtn');
  sb.textContent='Đang lưu...';sb.disabled=true;
  toast('⏳ Đang ghi vào Google Sheets...');
  try{
    const res=await jsonpWrite({
      action: editId?'update':'add',
      id:     editId,
      name:   document.getElementById('fName').value.trim(),
      channel:document.getElementById('fCh').value,
      content:content,
      status: document.getElementById('fSt').value,
      image:  currentImage,
    });
    if(res&&res.error)throw new Error(res.error);
    toast(editId?'✅ Đã cập nhật!':'✅ Đã thêm video mới!');
    closeModal();
    await syncData();
  }catch(err){toast('❌ '+err.message);}
  finally{saving=false;sb.textContent='Lưu';sb.disabled=false;}
}

// ── DELETE ──
async function delItem(){
  if(!editId||!confirm('Xoá video này?'))return;
  toast('⏳ Đang xoá...');
  const res=await jsonpWrite({action:'delete',id:editId});
  if(res&&res.error){toast('❌ '+res.error);return;}
  toast('🗑 Đã xoá');
  closeModal();
  await syncData();
}

// ── RENDER ──
function getFiltered(){
  return [...data].sort((a,b)=>{
    const ta=a.timestamp?new Date(a.timestamp).getTime():0;
    const tb=b.timestamp?new Date(b.timestamp).getTime():0;
    return tb-ta;
  }).filter(d=>
    (activeCh==='all'||d.channel===activeCh)&&
    (activeSt.size===0||activeSt.has(d.status))&&
    (!q||d.content.toLowerCase().includes(q)||d.name.toLowerCase().includes(q))
  );
}
function renderAll(rows){renderStats(rows);if(view==='kanban')renderKanban();else renderList();}

function renderStats(rows){
  const total=rows.length,dang=rows.filter(d=>d.status==='Đã đăng').length,chua=rows.filter(d=>d.status==='Chưa đăng').length;
  const san=rows.filter(d=>d.channel==='San Studio Busan').length,ss=rows.filter(d=>d.channel==='Ssanghy hanbok').length;
  const pct=total>0?Math.round(dang/total*100):0;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Tổng video</div><div class="stat-val">${total}</div><div class="stat-sub">Google Sheets</div></div>
    <div class="stat"><div class="stat-label">Đã đăng</div><div class="stat-val" style="color:var(--green)">${dang}</div><div class="stat-sub"><div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div></div></div>
    <div class="stat"><div class="stat-label">Chưa đăng</div><div class="stat-val" style="color:var(--red)">${chua}</div><div class="stat-sub">${chua} đang chờ</div></div>
    <div class="stat"><div class="stat-label">Theo kênh</div><div class="stat-val">2</div><div class="stat-sub"><span style="color:#b05510">San ${san}</span> · <span style="color:var(--red)">SS ${ss}</span></div></div>`;
}
function chBadge(ch){return ch==='San Studio Busan'?'<span class="card-ch ch-san">📸 San Studio</span>':'<span class="card-ch ch-ss">👘 Ssanghy</span>';}
function fmtDate(ts){if(!ts)return'';try{return new Date(ts).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'});}catch(e){return'';}}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function mkCard(d,i){
  const thumb = d.image ? `<img src="${d.image}" class="card-thumb" loading="lazy">` : '';
  const cls = d.image ? 'card has-thumb' : 'card';
  return `<div class="${cls}" style="animation-delay:${i*20}ms" onclick="editItem('${d.id}')">${thumb}${chBadge(d.channel)}<div class="card-body">${esc(d.content)}</div><div class="card-foot"><span class="card-name">${esc(d.name)||'—'}</span><span class="card-ts">${fmtDate(d.timestamp)}</span><span class="badge ${d.status==='Đã đăng'?'bd':'bc'}">${d.status}</span></div></div>`;
}

function renderKanban(){
  const f=getFiltered(),dang=f.filter(d=>d.status==='Đã đăng'),chua=f.filter(d=>d.status==='Chưa đăng');
  const col=(title,cls,arr)=>`<div class="col"><div class="col-head"><span class="col-title">${title}</span><span class="col-n ${cls}">${arr.length}</span></div>${arr.length?arr.map(mkCard).join(''):'<div class="empty">Không có video nào</div>'}</div>`;
  document.getElementById('kanban').innerHTML=col('Đã đăng','d',dang)+col('Chưa đăng','c',chua);
}
function renderList(){
  const f=getFiltered();
  document.getElementById('listV').innerHTML=f.length?`<div class="list-wrap"><table><thead><tr><th>Khách hàng</th><th>Kênh</th><th>Nội dung</th><th>Trạng thái</th><th>Ngày</th><th></th></tr></thead><tbody>${f.map(d=>`<tr><td>${esc(d.name)||'<span style="color:var(--text4)">—</span>'}</td><td>${chBadge(d.channel)}</td><td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d.content)}</td><td><span class="badge ${d.status==='Đã đăng'?'bd':'bc'}">${d.status}</span></td><td style="font-size:11px;color:var(--text3)">${fmtDate(d.timestamp)}</td><td><button class="btn btn-sm" onclick="editItem('${d.id}')">✏️</button></td></tr>`).join('')}</tbody></table></div>`:'<div class="empty" style="padding:48px">Không tìm thấy nội dung nào</div>';
}

// ── MODAL ──
function openModal(){
  editId=null;
  document.getElementById('modalTitle').textContent='Thêm nội dung mới';
  document.getElementById('fName').value='';
  document.getElementById('fContent').value='';
  document.getElementById('fCh').value='San Studio Busan';
  document.getElementById('fSt').value='Chưa đăng';
  document.getElementById('delBtn').style.display='none';
  resetImageUI('');
  showOverlay();
  setTimeout(()=>document.getElementById('fContent').focus(),350);
}
function editItem(id){
  const d=data.find(x=>x.id===id);if(!d)return;
  editId=id;
  document.getElementById('modalTitle').textContent='Chỉnh sửa nội dung';
  document.getElementById('fName').value=d.name;
  document.getElementById('fContent').value=d.content;
  document.getElementById('fCh').value=d.channel;
  document.getElementById('fSt').value=d.status;
  document.getElementById('delBtn').style.display='inline-flex';
  resetImageUI(d.image||'');
  showOverlay();
}
function showOverlay(){const o=document.getElementById('overlay');o.classList.add('open');requestAnimationFrame(()=>o.classList.add('show'));}
function closeModal(){const o=document.getElementById('overlay');o.classList.remove('show');setTimeout(()=>o.classList.remove('open'),300);}

// ── FILTERS ──
function setCh(ch,el){activeCh=ch;document.querySelectorAll('.chip[onclick^="setCh"]').forEach(c=>c.classList.remove('on'));el.classList.add('on');renderAll(data);}
function toggleSt(st,el){activeSt.has(st)?activeSt.delete(st):activeSt.add(st);el.classList.toggle('on');renderAll(data);}
function onSearch(v){q=v.toLowerCase();renderAll(data);}
function switchTab(v,el){view=v;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.getElementById('kanban').style.display=v==='kanban'?'grid':'none';document.getElementById('listV').style.display=v==='list'?'block':'none';renderAll(data);}

// ── HELPERS ──
function setSyncStatus(state,msg){
  const dot=document.getElementById('dot');
  dot.className='dot'+(state==='syncing'?' syncing':state==='err'?' err':'');
  document.getElementById('syncMsg').textContent=msg;
  document.getElementById('syncTime').textContent=state==='ok'?new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}):'';
}
function toast(msg,ms=2800){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms);}
</script>
